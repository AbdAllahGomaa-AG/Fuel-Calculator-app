<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Calculator</title>
    <meta name="description" content="Estimate fuel cost for your trip.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="calculator-container">
        <header class="header">
            <h1>Fuel Calculator</h1>
            <p>Estimate fuel cost for your trip</p>
        </header>

        <div class="mode-selector">
            <button type="button" id="mode-refill" class="mode-btn active" data-mode="refill">⛽ Fill Tank</button>
            <button type="button" id="mode-trip" class="mode-btn" data-mode="trip">🗺️ Trip Planner</button>
        </div>

        <main class="input-section">
            <div class="form-group" id="input-group-primary">
                <label for="distance" id="primary-label">Current Dashboard Range (KM)</label>
                <input type="number" id="distance" placeholder="e.g., 250" min="0" step="any">
            </div>

            <div class="form-group" id="input-trip-cost" hidden>
                <label for="trip-budget">Trip Budget (EGP) - <small>Optional if distance is set</small></label>
                <input type="number" id="trip-budget" placeholder="e.g., 500" min="0" step="any">
            </div>

            <div class="form-group">
                <label for="price">Fuel Price per Liter (EGP)</label>
                <input type="number" id="price" placeholder="e.g., 15.75" min="0" step="any">
            </div>

            <div class="form-group">
                <label for="condition">Driving Condition</label>
                <select id="condition">
                    <option value="mixed">🔀 Mixed (Mautad - 8.0L/100km)</option>
                    <option value="city">🏙️ City Only (9.5L/100km)</option>
                    <option value="highway">🛣️ Highway (7.0L/100km)</option>
                </select>
            </div>

            <div class="error-message" id="error-message" aria-live="polite"></div>

            <div class="action-section">
                <button type="button" id="calculate-btn" class="btn btn-primary">Calculate</button>
                <button type="button" id="reset-btn" class="btn btn-secondary">Reset</button>
            </div>
        </main>

        <section class="result-section" id="result-section" hidden>
            <div class="result-grid">
                <div class="result-card" id="card-liters">
                    <h3 id="label-liters">Liters to Fill</h3>
                    <p id="fuel-needed-result" class="result-value">0.00 <span class="unit">Liters</span></p>
                </div>
                <div class="result-card" id="card-cost">
                    <h3 id="label-cost">Cost to Fill</h3>
                    <p id="fuel-cost-result" class="result-value">0.00 <span class="unit">EGP</span></p>
                </div>
                <div class="result-card" id="card-range-added">
                    <h3>Range Added</h3>
                    <p id="range-added-result" class="result-value">0 <span class="unit">KM</span></p>
                </div>
                <div class="result-card" id="card-total-range">
                    <h3>New Total Range</h3>
                    <p id="new-range-result" class="result-value">0 <span class="unit">KM</span></p>
                </div>
            </div>
        </section>

        <footer class="vehicle-info">
            <p>Optimized for: <strong>Kia Soul 2014</strong><br>
            Tank Capacity: <strong>54L</strong> | Official Consumption: <strong>7.5 L/100km</strong></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
